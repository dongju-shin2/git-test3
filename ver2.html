<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <meta name="viewpoint" content="width=device, initial-scale="1.0">
        <title> HTML 목록 태그 예제 - HTML</title>
     </head>
     <body>
        <h1> 좋아하는 과일 </h1>
        <ul>
            <li>사과</li>
            <li>바나나</li>
            <li>오렌지</li>
        </ul>
        <h1> 웹 페이지 제작 순서 </h1>
        <ol type="1">
            <li>HTML 작성</li>
            <li>CSS 적용</li>
            <li>JavaScript 추가</li>
        </ol >
        <h1> HTML 용어 </h1>
        <h2> HTML </h2>
        <p> 웹 페이지의 구조를 정의하는 마크업 언어 </p>
        <h2> CSS </h2>
        <p> 웹 페이지의 디자인을 담당하는 스타일 시트 언어 </p>
        <h2> JavaScript </h2>
        <p> 웹 페이지에 동적인 기능을 추가하는 프로그래밍 언어 </p>
    </body>
</html>
